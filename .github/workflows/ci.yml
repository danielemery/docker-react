name: CI

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: ['main']

env:
  REGISTRY: demery
  IMAGE_NAME: docker-react
  NODE_VERSION: 24.18.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install packages
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm t

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          # upload-artifact excludes dotfiles by default; without this the
          # hidden entries below (.dockerignore, .npmignore, the local-pkg
          # .gitkeep) are silently dropped from the artifact.
          include-hidden-files: true
          path: |
            dist
            bin
            Dockerfile
            .dockerignore
            nginx.conf
            docker-react-entrypoint.sh
            .npmignore
            package*.json
            README.md
            e2e/local-pkg/.gitkeep

  e2e:
    # PR gate for the bootstrap (init/check) feature: scaffolds a fresh Vite app,
    # runs the LOCAL CLI's init, builds + runs the container, and drives it with
    # headless Playwright to assert runtime env injection reached the browser.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install packages
        run: npm ci

      - name: Install Playwright (chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        run: npm run test:e2e

  docker-build:
    # Exercise the release image build on PRs using the SAME artifact-only
    # context as publish-docker (download-artifact, no checkout), but without
    # pushing. This catches Dockerfile/packaging regressions (e.g. a COPY whose
    # source isn't in the uploaded artifacts) before a tag is cut — the e2e job
    # can't, since it builds from a full checkout. Installs docker-react@latest
    # (published) just to satisfy the image build; the working-tree CLI is
    # covered by the e2e job.
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Configure node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: artifacts

      - name: Install packages
        run: npm ci --omit=dev

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          build-args: |
            DOCKER_REACT_VERSION=latest

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: nowsprinting/check-version-format-action@v5.0.2
        id: version
        with:
          prefix: 'v'

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: artifacts
        if: steps.version.outputs.is_valid == 'true'

      - name: set package json version
        uses: jaywcjlove/github-action-package@main
        with:
          data: |
            {
              "version": "${{steps.version.outputs.full_without_prefix}}"
            }
        if: steps.version.outputs.is_valid == 'true'

      - name: Configure node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
        if: steps.version.outputs.is_valid == 'true'

      - name: Authenticate with npm
        run: echo "//registry.npmjs.org/:_authToken=${{secrets.NPM_TOKEN}}" > ~/.npmrc
        if: steps.version.outputs.is_valid == 'true'

      - name: Install packages
        run: npm ci --omit=dev
        if: steps.version.outputs.is_valid == 'true'

      - name: Publish to npm (stable channel)
        run: npm publish --access public
        if: steps.version.outputs.is_valid == 'true' && steps.version.outputs.is_stable == 'true'

      - name: Publish to npm (beta channel)
        run: npm publish --access public --tag beta
        if: steps.version.outputs.is_valid == 'true' && steps.version.outputs.is_stable == 'false'

  publish-docker:
    needs: publish-npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: nowsprinting/check-version-format-action@v5.0.2
        id: version
        with:
          prefix: 'v'

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: artifacts
        if: steps.version.outputs.is_valid == 'true'

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        if: steps.version.outputs.is_valid == 'true'

      - name: Install packages
        run: npm ci --omit=dev
        if: steps.version.outputs.is_valid == 'true'

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=${{ steps.version.outputs.is_stable == 'true' && 'true' || 'false' }}
        if: steps.version.outputs.is_valid == 'true'

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOCKER_REACT_VERSION=${{ steps.version.outputs.full }}
        if: steps.version.outputs.is_valid == 'true'
